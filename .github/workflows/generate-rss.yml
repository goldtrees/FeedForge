name: Generate RSS Feeds

on:
  # 10분 간격 스케줄 (Public 리포 — Actions 무제한)
  schedule:
    - cron: '4,14,24,34,44,54 * * * *'

  # 수동 트리거
  workflow_dispatch:

  # config 변경 시 즉시 실행
  push:
    paths:
      - 'config/**'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate configuration
        run: npm run validate

      - name: Generate RSS feeds
        run: npm run generate

      - name: Commit and push changes
        run: |
          git config user.name "FeedForge Bot"
          git config user.email "feedforge-bot@users.noreply.github.com"
          git add --force docs/feeds/ docs/meta.json
          # 변경분이 있을 때만 커밋
          if git diff --staged --quiet; then
            echo "변경 없음 — 커밋 생략"
          else
            git commit -m "chore: update RSS feeds [skip ci]"
            git push
          fi
