# ============================================================
# FeedForge — 피드 설정 파일
# 새 사이트 추가: 아래 템플릿을 복사하여 selectors만 수정하세요.
# ============================================================

global:
  # 기본 요청 설정 (피드별로 override 가능)
  request:
    userAgent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
    timeout: 15000
    retries: 3
    retryDelay: 2000
  # 기본 출력 설정
  output:
    maxItems: 30

feeds:
  # ─── theqoo 스퀘어 ───
  - name: "theqoo-square"
    url: "https://theqoo.net/square"
    request:
      encoding: "utf-8"
    pagination:
      param: "page"           # 페이지 파라미터 이름
      startPage: 1            # 시작 페이지 번호
      maxPages: 5             # 최대 수집 페이지 수
      step: 1                 # 페이지 번호 증가값
      delay: 1500             # 페이지 간 딜레이 (ms)
      stopOnError: false      # 오류 시 중단 여부
    selectors:
      # 게시물 행 목록 (각 <tr> 또는 <div>)
      list: "table.theqoo_board tbody tr, .bd_lst tbody tr"
      # 각 필드 추출 규칙
      no:
        selector: ".no, td.no"
        extract: "number"
      title:
        selector: ".title a, td.title a"
        extract: "text"
      link:
        selector: ".title a, td.title a"
        extract: "attr:href"
        baseUrl: "https://theqoo.net"
        stripParams: ["page"]    # 페이지네이션 파라미터 제거
      date:
        selector: ".time, td.time"
        extract: "text"
        format: "YYYY.MM.DD HH:mm"
      category:
        selector: "td.cate, .cate"
        extract: "text"
      views:
        selector: "td.m_no:last-child, .m_no:last-child"
        extract: "number"
      # likes: 목록 페이지에 추천수 컬럼 없음 (상세 페이지에만 존재)
      # author: 목록 페이지에 작성자 컬럼 없음 (상세 페이지에만 존재)
      postNumber:
        selector: ".no, td.no"
        extract: "text"
    filters:
      includeKeywords: []
      excludeKeywords: ["광고", "공지", "인터넷가입", "야간상담", "비밀혜택"]
      minViews: 0
      minLikes: 0
      minNo: 0
      maxNo: 0
    output:
      filename: "theqoo-square.xml"
      maxItems: 100
      title: "더쿠 스퀘어"
      description: "theqoo 스퀘어 최신글 RSS 피드"
      link: "https://theqoo.net/square"

  # ─── 클리앙 전체글보기 ───
  - name: "clien-all"
    url: "https://www.clien.net/service/group/clien_all"
    request:
      encoding: "utf-8"
    pagination:
      param: "po"             # 클리앙은 po 파라미터 사용
      startPage: 0            # 클리앙은 0부터 시작
      maxPages: 5
      step: 1
      delay: 1500
      stopOnError: false
    selectors:
      list: ".list_item:not(.blocked)"
      no:
        selector: ".list_number .no"
        extract: "number"
      title:
        selector: ".subject_fixed"
        extract: "text"
      link:
        selector: ".list_subject"
        extract: "attr:href"
        baseUrl: "https://www.clien.net"
      date:
        selector: ".timestamp"
        extract: "text"
        format: "YYYY-MM-DD HH:mm:ss"
      views:
        selector: ".hit"
        extract: "number"
      likes:
        selector: ".symph"
        extract: "number"
      postNumber:
        selector: ".list_number"
        extract: "text"
      author:
        selector: ".nickname"
        extract: "text"
    filters:
      includeKeywords: []
      excludeKeywords: ["광고", "공지", "인터넷가입", "야간상담", "비밀혜택"]
      minViews: 0
      minLikes: 0
      minNo: 0
      maxNo: 0
    output:
      filename: "clien-all.xml"
      maxItems: 100
      title: "클리앙 전체글보기"
      description: "클리앙 전체글보기 RSS 피드"
      link: "https://www.clien.net/service/group/clien_all"

